<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="profile-details"></div>
        </body>
        <script>
            const parent = document.querySelector(".profile-details");
            const params = new URLSearchParams(window.location.search);

            const username =
            params.get("username");

            const url = `https://api.github.com/users/${username}`;

                async function get_data(){

                    try{
                        const response = await fetch(url);
                        const data = await response.json();
                        if(!response.ok) throw new Error ("User Not Found");



                        const card = document.createElement("div");

                        card.classList.add("profile-card");

                        const gitBtn = document.createElement("button");
                        gitBtn.textContent = "Github";

                        card.innerHTML = `
                            <img class="image" src="${data.avatar_url}">
                            <p>${data.login}</p>
                            <p>Followers: ${data.followers}</p>
                            <p>Following: ${data.following}</p>
                            <p>Location: ${data.location}</p>
                            <p>Created_at: ${data.created_at}</p>
                            
                        `;

                        gitBtn.addEventListener('click', function(){
                            window.location.href = data.html_url;
                        })

                        parent.appendChild(card);
                        card.appendChild(gitBtn);
                    }

                    catch(error){
                        parent.innerHTML = `Network Error:  ${error}`;
                    }

                
                }
            

            
            get_data();
            
        </script>
</html>
